name: React Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari cek
        uses: actions/checkout@v4

      - name: Node.js qurasdir
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build et
        run: |
          npm install
          npm run build

      - name: Build qovlugunu saxla
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: build/
